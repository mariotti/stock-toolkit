stages:
  - test

lint:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install "ruff==0.15.*"
  script:
    - ruff check pyApi

test:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    # headless matplotlib for --plot code paths exercised by tests
    MPLBACKEND: Agg
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e pyApi coverage
  script:
    - cd pyApi
    - coverage run --source=stock_toolkit -m unittest discover -s tests -v
    - coverage report
  # surfaces the percentage on the pipeline/MR (parsed from `coverage report`)
  coverage: '/TOTAL.*\s(\d+%)/'
