stages:
  - test

lint:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  before_script:
    - pip install "ruff==0.15.*"
  script:
    - ruff check pyApi

docs-test-count:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  variables:
    MPLBACKEND: Agg
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e pyApi
  # Fails if the test-count figures in README/DEVELOPING drifted from the
  # real `Ran N tests` output — the drift that let 242 rot to 148 unnoticed.
  script:
    - python pyApi/bin/update-test-counts --check

test:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    # headless matplotlib for --plot code paths exercised by tests
    MPLBACKEND: Agg
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e pyApi coverage codecov-cli
  script:
    - cd pyApi
    - coverage run --source=stock_toolkit -m unittest discover -s tests -v
    - coverage report
    - coverage xml -o coverage.xml          # Cobertura for GitLab + Codecov
    # Codecov upload — best-effort, never gate the build on Codecov being up.
    # Needs CODECOV_TOKEN as a (masked) CI/CD variable on the project.
    - codecovcli upload-process -t "$CODECOV_TOKEN" -f coverage.xml
      || echo "[codecov] upload failed (non-fatal)"
  # surfaces the percentage on the pipeline/MR (parsed from `coverage report`)
  coverage: '/TOTAL.*\s(\d+%)/'
  # A: native GitLab — inline coverage annotations on MR diffs.
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: pyApi/coverage.xml

# Weekly scheduled run with NO pip cache: catches breakage from fresh
# releases of dependencies (yfinance in particular is an unofficial
# scraper that can break without notice).
test-latest-deps:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    MPLBACKEND: Agg
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e pyApi
  script:
    - pip list | grep -iE "yfinance|pandas|numpy|scipy|matplotlib|streamlit|plotly|requests"
    - cd pyApi
    - python -m unittest discover -s tests -v
